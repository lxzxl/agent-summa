<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS app-icon safe area: the squircle body is 824×824 centered in the 1024 canvas
       (≈100px transparent margin all round), matching the system icon grid so it sits the
       same size as other dock icons. -->
  <defs>
    <linearGradient id="bg" x1="100" y1="100" x2="924" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B5BF0"/>
      <stop offset="0.55" stop-color="#8A4BD6"/>
      <stop offset="1" stop-color="#E0556E"/>
    </linearGradient>
    <linearGradient id="sheen" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#sheen)"/>
  <!-- Σ (summa): the sum of every agent's sessions, unified — scaled to the inset squircle -->
  <g transform="translate(512 512) scale(0.8) translate(-512 -512)">
    <polyline points="720,310 306,310 552,512 306,714 720,714" fill="none" stroke="#FFFFFF"
      stroke-width="84" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
